        description: "Total days to receive (DateReceived - DateOrdered)"
      - name: days_to_invoice
        description: "Days from receipt to invoice (DateInvoiced - DateReceived)"
      - name: etl_batch_id
        description: "ETL batch identifier that loaded this record"
        tests:
          - not_null
      - name: load_timestamp
        description: "Timestamp when record was last updated"
        tests:
          - not_null
