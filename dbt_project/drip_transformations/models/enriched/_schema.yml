version: 2

models:
  - name: dim_date
    description: "Standard date dimension with fiscal calendar support. Used as a role-playing dimension across all fact tables. Incrementally materialized from vw_interim_dim_date_erp."
    columns:
      - name: date_hash_pk
        description: "Surrogate primary key for date dimension"
        tests:
          - unique
          - not_null
      - name: date_value
        description: "Actual calendar date value"
        tests:
          - not_null
      - name: date_key
        description: "Integer date key in YYYYMMDD format for partitioning"
        tests:
          - not_null
      - name: day_of_week
        description: "Day of week number (1=Sunday, 7=Saturday)"
        tests:
          - not_null
      - name: day_name
        description: "Full name of day (Sunday, Monday, etc.)"
        tests:
          - not_null
      - name: day_of_month
        description: "Day number within the month (1-31)"
        tests:
          - not_null
      - name: day_of_year
        description: "Day number within the year (1-366)"
        tests:
          - not_null
      - name: week_of_year
        description: "ISO week number within the year (1-53)"
        tests:
          - not_null
      - name: month_number
        description: "Month number (1-12)"
        tests:
          - not_null
      - name: month_name
        description: "Full name of month (January, February, etc.)"
        tests:
          - not_null
      - name: month_abbrev
        description: "Three-letter month abbreviation (Jan, Feb, etc.)"
        tests:
          - not_null
      - name: quarter_number
        description: "Calendar quarter number (1-4)"
        tests:
          - not_null
      - name: quarter_name
        description: "Quarter label (Q1, Q2, Q3, Q4)"
        tests:
          - not_null
      - name: year_number
        description: "Four-digit calendar year"
        tests:
          - not_null
      - name: year_month
        description: "Year and month in YYYY-MM format"
        tests:
          - not_null
      - name: year_quarter
        description: "Year and quarter in YYYY-Q# format"
        tests:
          - not_null
      - name: fiscal_month_number
        description: "Fiscal month number (1-12)"
        tests:
          - not_null
      - name: fiscal_quarter_number
        description: "Fiscal quarter number (1-4)"
        tests:
          - not_null
      - name: fiscal_year_number
        description: "Fiscal year number"
        tests:
          - not_null
      - name: is_weekend
        description: "True if Saturday or Sunday"
        tests:
          - not_null
      - name: is_holiday
        description: "True if a recognized holiday"
        tests:
          - not_null
      - name: holiday_name
        description: "Name of holiday if applicable"
      - name: is_last_day_of_month
        description: "True if last day of calendar month"
        tests:
          - not_null
      - name: is_last_day_of_quarter
        description: "True if last day of calendar quarter"
        tests:
          - not_null
      - name: is_last_day_of_year
        description: "True if last day of calendar year"
        tests:
          - not_null
  - name: dim_product
    description: "Product master with full hierarchy (Category > Subcategory > Brand > Product). Supports SCD Type 2 for historical tracking. Incrementally materialized from vw_interim_dim_product_erp."
    columns:
      - name: product_hash_pk
        description: "Surrogate primary key for product dimension"
        tests:
          - unique
          - not_null
      - name: product_hash_bk
        description: "Natural business key from source system (SKU)"
        tests:
          - not_null
      - name: product_name
        description: "Full product display name"
        tests:
          - not_null
      - name: product_description
        description: "Detailed product description"
      - name: category_code
        description: "Product category code"
        tests:
          - not_null
      - name: category_name
        description: "Product category name (top level of hierarchy)"
        tests:
          - not_null
      - name: subcategory_code
        description: "Product subcategory code"
        tests:
          - not_null
      - name: subcategory_name
        description: "Product subcategory name (second level of hierarchy)"
        tests:
          - not_null
      - name: brand_code
        description: "Brand identifier code"
        tests:
          - not_null
      - name: brand_name
        description: "Brand display name (third level of hierarchy)"
        tests:
          - not_null
      - name: unit_of_measure
        description: "Standard unit of measure (Each, Case, Pound, etc.)"
        tests:
          - not_null
      - name: pack_size
        description: "Package size description"
      - name: unit_cost
        description: "Standard unit cost at time of record"
        tests:
          - not_null
      - name: unit_list_price
        description: "Standard list price at time of record"
        tests:
          - not_null
      - name: is_active
        description: "True if product is currently active for sale"
        tests:
          - not_null
      - name: is_discontinued
        description: "True if product has been discontinued"
        tests:
          - not_null
      - name: effective_date
        description: "Start date when this version became effective"
        tests:
          - not_null
      - name: expiration_date
        description: "End date when this version expired (NULL if current)"
      - name: is_current
        description: "True if this is the current active version"
        tests:
          - not_null
      - name: etl_batch_id
        description: "ETL batch identifier that loaded this record"
        tests:
          - not_null
      - name: load_timestamp
        description: "Timestamp when record was loaded"
        tests:
          - not_null
  - name: dim_store
    description: "Retail store locations with geographic hierarchy (Region > District > Store). Incrementally materialized from vw_interim_dim_store_erp."
    columns:
      - name: store_hash_pk
