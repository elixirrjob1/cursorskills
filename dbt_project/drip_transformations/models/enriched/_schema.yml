  - name: fact_sales
    description: "Sales transaction line items capturing all retail sales activity. Returns are modeled as negative quantities. Incrementally materialized from vw_interim_fact_sales_erp."
    columns:
      - name: sales_hash_pk
        description: "Surrogate primary key for sales fact"
        tests:
          - unique
          - not_null
      - name: date_hash_fk
        description: "Foreign key to date dimension (transaction date)"
        tests:
          - not_null
      - name: product_hash_fk
        description: "Foreign key to product dimension"
        tests:
          - not_null
      - name: store_hash_fk
        description: "Foreign key to store dimension"
        tests:
          - not_null
      - name: customer_hash_fk
        description: "Foreign key to customer dimension (NULL for anonymous sales)"
      - name: employee_hash_fk
        description: "Foreign key to employee dimension (sales associate)"
      - name: transaction_number
        description: "Degenerate dimension - source transaction ID"
        tests:
          - not_null
      - name: transaction_line_number
        description: "Line item number within the transaction"
        tests:
          - not_null
      - name: transaction_type
        description: "Transaction type (Sale, Return, Exchange)"
        tests:
          - not_null
      - name: quantity
        description: "Quantity sold (negative for returns)"
        tests:
          - not_null
      - name: unit_price
        description: "Unit selling price at time of transaction"
        tests:
          - not_null
      - name: unit_cost
        description: "Unit cost at time of transaction"
        tests:
          - not_null
      - name: gross_amount
        description: "Gross amount before discounts (Quantity x UnitPrice)"
        tests:
          - not_null
      - name: discount_amount
        description: "Total discount amount applied"
        tests:
          - not_null
      - name: tax_amount
        description: "Tax amount charged"
        tests:
          - not_null
      - name: net_amount
        description: "Net amount after discounts and tax"
        tests:
          - not_null
      - name: cost_amount
        description: "Total cost of goods sold"
        tests:
          - not_null
      - name: profit_amount
        description: "Profit amount (NetAmount - CostAmount)"
        tests:
          - not_null
      - name: is_promotion
        description: "True if item was sold under a promotion"
        tests:
          - not_null
      - name: promotion_code
        description: "Promotion code if applicable"
      - name: payment_method
        description: "Payment method used (Cash, Credit, Debit, GiftCard)"
        tests:
          - not_null
      - name: etl_batch_id
        description: "ETL batch identifier that loaded this record"
        tests:
          - not_null
      - name: load_timestamp
        description: "Timestamp when record was loaded"
        tests:
          - not_null
