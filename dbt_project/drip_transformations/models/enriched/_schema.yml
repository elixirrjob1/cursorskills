version: 2

models:
  - name: DimDate
    description: "Standard date dimension with fiscal calendar support. Used as a role-playing dimension across all fact tables. Incrementally materialized from vw_DimDate."
    columns:
      - name: DateHashPK
        description: "Surrogate primary key for date dimension"
        tests:
          - unique
          - not_null
      - name: DateValue
        description: "Actual calendar date value"
        tests:
          - not_null
      - name: DateKey
        description: "Integer date key in YYYYMMDD format for partitioning"
        tests:
          - not_null
      - name: DayOfWeek
        description: "Day of week number (1=Sunday, 7=Saturday)"
        tests:
          - not_null
      - name: DayName
        description: "Full name of day (Sunday, Monday, etc.)"
        tests:
          - not_null
      - name: DayOfMonth
        description: "Day number within the month (1-31)"
        tests:
          - not_null
      - name: DayOfYear
        description: "Day number within the year (1-366)"
        tests:
          - not_null
      - name: WeekOfYear
        description: "ISO week number within the year (1-53)"
        tests:
          - not_null
      - name: MonthNumber
        description: "Month number (1-12)"
        tests:
          - not_null
      - name: MonthName
        description: "Full name of month (January, February, etc.)"
        tests:
          - not_null
      - name: MonthAbbrev
        description: "Three-letter month abbreviation (Jan, Feb, etc.)"
        tests:
          - not_null
      - name: QuarterNumber
        description: "Calendar quarter number (1-4)"
        tests:
          - not_null
      - name: QuarterName
        description: "Quarter label (Q1, Q2, Q3, Q4)"
        tests:
          - not_null
      - name: YearNumber
        description: "Four-digit calendar year"
        tests:
          - not_null
      - name: YearMonth
        description: "Year and month in YYYY-MM format"
        tests:
          - not_null
      - name: YearQuarter
        description: "Year and quarter in YYYY-Q# format"
        tests:
          - not_null
      - name: FiscalMonthNumber
        description: "Fiscal month number (1-12)"
        tests:
          - not_null
      - name: FiscalQuarterNumber
        description: "Fiscal quarter number (1-4)"
        tests:
          - not_null
      - name: FiscalYearNumber
        description: "Fiscal year number"
        tests:
          - not_null
      - name: IsWeekend
        description: "True if Saturday or Sunday"
        tests:
          - not_null
      - name: IsHoliday
        description: "True if a recognized holiday"
        tests:
          - not_null
      - name: HolidayName
        description: "Name of holiday if applicable"
      - name: IsLastDayOfMonth
        description: "True if last day of calendar month"
        tests:
          - not_null
      - name: IsLastDayOfQuarter
        description: "True if last day of calendar quarter"
        tests:
          - not_null
      - name: IsLastDayOfYear
        description: "True if last day of calendar year"
        tests:
          - not_null
  - name: DimProduct
    description: "Product master — SCD Type 2 following Ajay's multi-CTE view pattern. Full-refresh table materialization from vw_DimProduct (incremental is unsafe for Type 2 because old versions are closed out by LEAD(EffectiveStart)). Grain: (ProductHashPK, EffectiveStartDateTime)."
    columns:
      - name: ProductHashPK
        description: "Surrogate primary key for product dimension version."
        tests:
          - not_null
      - name: ProductHashBK
        description: "Natural business key (SKU), hashed."
        tests:
          - not_null
      - name: EffectiveStartDateTime
        description: "Type 2 SCD: start of version validity window."
        tests:
          - not_null
      - name: EffectiveEndDateTime
        description: "Type 2 SCD: end of version validity window."
        tests:
          - not_null
      - name: CurrentFlagYN
        description: "Type 2 SCD: 'Y' if this is the most recent row for this key (regardless of deletion status), 'N' if superseded."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Y', 'N']
      - name: SoftDeletedFlagYN
        description: "Type 2 SCD: 'Y' if this is the latest row and the source explicitly marked the record inactive (ACTIVE = false) while the record still exists in the source system."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Y', 'N']
      - name: DeletedFlagYN
        description: "Type 2 SCD: 'Y' if this is the latest row and the record has been removed from the source system (_FIVETRAN_ACTIVE = false)."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Y', 'N']
      - name: SourceSystemCode
        description: "Source system identifier ('ERP')."
        tests:
          - not_null
  - name: DimStore
    description: "Retail store locations with geographic hierarchy (Region > District > Store). Incrementally materialized from vw_DimStore."
    columns:
      - name: StoreHashPK
