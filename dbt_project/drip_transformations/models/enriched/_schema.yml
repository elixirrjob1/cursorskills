        description: "Store street address"
        tests:
          - not_null
      - name: City
        description: "City where store is located"
        tests:
          - not_null
      - name: StateProvince
        description: "State or province"
        tests:
          - not_null
      - name: PostalCode
        description: "Postal or ZIP code"
        tests:
          - not_null
      - name: Country
        description: "Country name"
        tests:
          - not_null
      - name: Latitude
        description: "Geographic latitude for mapping"
      - name: Longitude
        description: "Geographic longitude for mapping"
      - name: DistrictCode
        description: "District identifier code"
        tests:
          - not_null
      - name: DistrictName
        description: "District name (second level of hierarchy)"
        tests:
          - not_null
      - name: RegionCode
        description: "Region identifier code"
        tests:
          - not_null
      - name: RegionName
        description: "Region name (top level of hierarchy)"
        tests:
          - not_null
      - name: StoreManager
        description: "Current store manager name"
      - name: OpenDate
        description: "Date store opened for business"
        tests:
          - not_null
      - name: CloseDate
        description: "Date store closed (NULL if still open)"
      - name: SquareFootage
        description: "Total store square footage"
      - name: IsActive
        description: "True if store is currently operating"
        tests:
          - not_null
      - name: EtlBatchId
        description: "ETL batch identifier that loaded this record"
        tests:
          - not_null
      - name: LoadTimestamp
        description: "Timestamp when record was loaded"
