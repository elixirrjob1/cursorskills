      - name: DaysToShip
        description: "Days from order to ship (DateShipped - DateOrdered)"
      - name: DaysInTransit
        description: "Days in transit (DateReceived - DateShipped)"
      - name: DaysToReceive
        description: "Total days to receive (DateReceived - DateOrdered)"
      - name: DaysToInvoice
        description: "Days from receipt to invoice (DateInvoiced - DateReceived)"
      - name: EtlBatchId
        description: "ETL batch identifier that loaded this record"
        tests:
          - not_null
      - name: LoadTimestamp
        description: "Timestamp when record was last updated"
        tests:
          - not_null
