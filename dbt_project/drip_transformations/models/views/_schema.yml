version: 2

models:
  - name: vw_DimDate
    description: "View layer for DimDate — transformation logic from bronze source. Standard date dimension with fiscal calendar support. Used as a role-playing dimension across all fact tables."
    columns:
      - name: DateHashPK
        description: "Surrogate primary key for date dimension"
        tests:
          - unique
          - not_null
          - source_not_in_target:
              target_model: "{{ ref('DimDate') }}"
      - name: DateValue
        description: "Actual calendar date value"
        tests:
          - not_null
      - name: DateKey
        description: "Integer date key in YYYYMMDD format for partitioning"
        tests:
          - not_null
      - name: DayOfWeek
        description: "Day of week number (1=Sunday, 7=Saturday)"
        tests:
          - not_null
      - name: DayName
        description: "Full name of day (Sunday, Monday, etc.)"
        tests:
          - not_null
      - name: DayOfMonth
        description: "Day number within the month (1-31)"
        tests:
          - not_null
      - name: DayOfYear
        description: "Day number within the year (1-366)"
        tests:
          - not_null
      - name: WeekOfYear
        description: "ISO week number within the year (1-53)"
        tests:
          - not_null
      - name: MonthNumber
        description: "Month number (1-12)"
        tests:
          - not_null
      - name: MonthName
        description: "Full name of month (January, February, etc.)"
        tests:
          - not_null
      - name: MonthAbbrev
        description: "Three-letter month abbreviation (Jan, Feb, etc.)"
        tests:
          - not_null
      - name: QuarterNumber
        description: "Calendar quarter number (1-4)"
        tests:
          - not_null
      - name: QuarterName
        description: "Quarter label (Q1, Q2, Q3, Q4)"
        tests:
          - not_null
      - name: YearNumber
        description: "Four-digit calendar year"
        tests:
          - not_null
      - name: YearMonth
        description: "Year and month in YYYY-MM format"
        tests:
          - not_null
      - name: YearQuarter
        description: "Year and quarter in YYYY-Q# format"
        tests:
          - not_null
      - name: FiscalMonthNumber
        description: "Fiscal month number (1-12)"
        tests:
          - not_null
      - name: FiscalQuarterNumber
        description: "Fiscal quarter number (1-4)"
        tests:
          - not_null
      - name: FiscalYearNumber
        description: "Fiscal year number"
        tests:
          - not_null
      - name: IsWeekend
        description: "True if Saturday or Sunday"
        tests:
          - not_null
      - name: IsHoliday
        description: "True if a recognized holiday"
        tests:
          - not_null
      - name: HolidayName
        description: "Name of holiday if applicable"
      - name: IsLastDayOfMonth
        description: "True if last day of calendar month"
        tests:
          - not_null
      - name: IsLastDayOfQuarter
        description: "True if last day of calendar quarter"
        tests:
          - not_null
      - name: IsLastDayOfYear
        description: "True if last day of calendar year"
        tests:
          - not_null
  - name: vw_DimProduct
    description: "View layer for DimProduct — Type 2 SCD following Ajay Kalyan's multi-CTE pattern (cte_prep / _hash / _hash_lag / _row_reduce / fin). Uses Fivetran history-mode columns (_FIVETRAN_START / _FIVETRAN_END / _FIVETRAN_ACTIVE) for version windows. Grain: one row per product version, keyed by (ProductHashPK, EffectiveStartDateTime)."
    columns:
      - name: ProductHashPK
        description: "Surrogate primary key for product dimension version (HASH(PRODUCT_ID + SourceSystemCode) -> NUMBER(19,0))."
        tests:
          - not_null
          - source_not_in_target:
              target_model: "{{ ref('DimProduct') }}"
      - name: ProductHashBK
        description: "Natural business key from source system, hashed (HASH(SKU + SourceSystemCode) -> NUMBER(19,0))."
        tests:
          - not_null
      - name: BrandCode
        description: "Brand identifier code (not available in source — NULL)."
      - name: BrandName
        description: "Brand display name (not available in source — NULL)."
      - name: CategoryCode
        description: "Product category code (not available in source — NULL)."
      - name: CategoryName
        description: "Product category name (top level of hierarchy)."
      - name: IsActive
        description: "True if product is currently active for sale."
        tests:
          - not_null
      - name: IsDiscontinued
        description: "True if product has been discontinued."
        tests:
          - not_null
      - name: PackSize
        description: "Package size description (not available in source — NULL)."
      - name: ProductDescription
        description: "Detailed product description."
      - name: ProductName
        description: "Full product display name."
      - name: SubcategoryCode
        description: "Product subcategory code (not available in source — NULL)."
      - name: SubcategoryName
        description: "Product subcategory name (not available in source — NULL)."
      - name: UnitCost
        description: "Standard unit cost at time of record."
      - name: UnitListPrice
        description: "Standard list price at time of record."
      - name: UnitOfMeasure
        description: "Standard unit of measure (not available in source — NULL)."
      - name: EffectiveStartDateTime
        description: "Type 2 SCD: start of this version's validity window (= _FIVETRAN_START)."
        tests:
          - not_null
      - name: EffectiveEndDateTime
        description: "Type 2 SCD: end of this version's validity window (= _FIVETRAN_END or sentinel)."
        tests:
          - not_null
      - name: CurrentFlagYN
        description: "Type 2 SCD: 'Y' if current version, 'N' if historical."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Y', 'N']
      - name: CreatedDateTime
        description: "Timestamp when this version was first created in the warehouse."
        tests:
          - not_null
      - name: ModifiedDateTime
        description: "Timestamp when this version was last synced."
        tests:
          - not_null
      - name: SourceSystemCode
        description: "Source system identifier (hard-coded 'ERP')."
        tests:
          - not_null
      - name: SourceProductPK
        description: "Pre-hash source primary key (PRODUCT_ID)."
        tests:
          - not_null
      - name: SourceProductBK
        description: "Pre-hash source business key (SKU)."
      - name: FileName
        description: "Source file name (empty for Fivetran-sourced tables)."
      - name: StageInsertedDateTimeUTC
        description: "Fivetran _FIVETRAN_SYNCED timestamp."
        tests:
          - not_null
      - name: Hashbytes
        description: "SHA2_256 hash over business attributes for change detection."
      - name: DataCondition
        description: "Data Condition label ('Data Condition 1')."
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['Data Condition 1']
