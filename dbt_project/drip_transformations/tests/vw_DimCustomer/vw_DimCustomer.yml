# Unit tests for vw_DimCustomer.
#
# First 3 tests (hand-crafted): assert the interesting logic —
#   SCD2 dedup via LAG(Hashbytes), LEAD-based EffectiveEndDateTime,
#   CurrentFlagYN rules, and FullName NULL handling.
#
# Last 3 tests (generated by view-to-dbt-unit-test skill): schema-shape
#   coverage with type/name-aware fixtures from OpenMetadata. Derived output
#   columns left as `null # TODO` so every expectation is intentional.
#
# Source FQN (OpenMetadata): snowflake_fivetran.DRIP_DATA_INTELLIGENCE.BRONZE_ERP__DBO.CUSTOMERS

version: 2

unit_tests:

  # ============================================================
  # Hand-crafted: assert the meaningful transformation logic
  # ============================================================

  - name: test_dim_customer__scd2_dedup_and_current_flag
    description: >
      Scenario: Customer has 3 source rows but the middle row is a no-op
      (identical hashable attributes), so SCD2 dedup collapses it.

      Note: in current vw_DimCustomer.sql, LEAD(EffectiveStartDateTimeUTC)
      is computed after row-reduce, so the surviving v1 row end-dates
      against the next surviving version (row 3 start - 1µs).

      CurrentFlagYN depends only on whether LeadEffectiveStartDateTimeUTC
      is NULL (final-row marker), not on _FIVETRAN_ACTIVE. The last row
      has no lead, so CurrentFlagYN = 'Y'.
    model: vw_DimCustomer
    given:
      - input: source('bronze_erp__dbo', 'CUSTOMERS')
        rows:
          # Row 1 — initial insert
          - CUSTOMER_ID: 101
            FIRST_NAME: 'Ada'
            LAST_NAME: 'Lovelace'
            EMAIL: 'ada@example.com'
            PHONE: '555-0001'
            CREATED_AT: '2024-01-01 00:00:00 +00:00'
            UPDATED_AT: '2024-01-01 00:00:00 +00:00'
            _FIVETRAN_SYNCED: '2024-01-01 00:00:00 +00:00'
            _FIVETRAN_START: '2024-01-01 00:00:00 +00:00'
            _FIVETRAN_END:   '9999-12-31 23:59:59 +00:00'
            _FIVETRAN_ACTIVE: false
          # Row 2 — SAME hashable cols as row 1 → should be dropped by row-reduce
          - CUSTOMER_ID: 101
            FIRST_NAME: 'Ada'
            LAST_NAME: 'Lovelace'
            EMAIL: 'ada@example.com'
            PHONE: '555-0001'
            CREATED_AT: '2024-01-01 00:00:00 +00:00'
            UPDATED_AT: '2024-02-01 00:00:00 +00:00'
            _FIVETRAN_SYNCED: '2024-02-01 00:00:00 +00:00'
            _FIVETRAN_START: '2024-02-01 00:00:00 +00:00'
            _FIVETRAN_END:   '9999-12-31 23:59:59 +00:00'
            _FIVETRAN_ACTIVE: false
          # Row 3 — email changed → new SCD2 version, currently active
          - CUSTOMER_ID: 101
            FIRST_NAME: 'Ada'
            LAST_NAME: 'Lovelace'
            EMAIL: 'ada.l@example.com'
            PHONE: '555-0001'
            CREATED_AT: '2024-01-01 00:00:00 +00:00'
            UPDATED_AT: '2024-03-01 00:00:00 +00:00'
            _FIVETRAN_SYNCED: '2024-03-01 00:00:00 +00:00'
            _FIVETRAN_START: '2024-03-01 00:00:00 +00:00'
            _FIVETRAN_END:   '9999-12-31 23:59:59 +00:00'
            _FIVETRAN_ACTIVE: true
    expect:
      rows:
        # Surviving v1: closed out 1µs before row 3's start (LEAD after dedup).
        - SourceCustomerBK: '101'
          EmailAddress: 'ada@example.com'
          FirstName: 'Ada'
          LastName: 'Lovelace'
          FullName: 'Ada Lovelace'
          PhoneNumber: '555-0001'
          AcquisitionDate: '2024-01-01'
          EffectiveStartDateTime: '2024-01-01 00:00:00 +00:00'
          EffectiveEndDateTime:   '2024-02-29 23:59:59 +00:00'
          CurrentFlagYN: 'N'
          DeletedFlagYN: 'N'
          SourceSystemCode: 'ERP'
          IsActive: true
          DataCondition: 'Data Condition 1'
        # Current version: no lead row → CurrentFlagYN = 'Y'.
        - SourceCustomerBK: '101'
          EmailAddress: 'ada.l@example.com'
          FirstName: 'Ada'
          LastName: 'Lovelace'
          FullName: 'Ada Lovelace'
          PhoneNumber: '555-0001'
          AcquisitionDate: '2024-01-01'
          EffectiveStartDateTime: '2024-03-01 00:00:00 +00:00'
          EffectiveEndDateTime:   '1816-03-30 05:56:08 +00:00'
          CurrentFlagYN: 'Y'
          DeletedFlagYN: 'N'
          SourceSystemCode: 'ERP'
          IsActive: true
          DataCondition: 'Data Condition 1'

  - name: test_dim_customer__deleted_flag_when_inactive
    description: >
      Scenario: only one version exists (no lead row) and Fivetran marks the
      record inactive. Per current SQL:
        CurrentFlagYN = 'Y' (LEAD is NULL → final row, regardless of ACTIVE)
        DeletedFlagYN = 'Y' (final row AND NOT IsFivetranActive)
      EffectiveEndDateTime falls back to EffectiveEndDateTimeRaw (_FIVETRAN_END).
    model: vw_DimCustomer
    given:
      - input: source('bronze_erp__dbo', 'CUSTOMERS')
        rows:
          - CUSTOMER_ID: 202
            FIRST_NAME: 'Grace'
            LAST_NAME: 'Hopper'
            EMAIL: 'grace@example.com'
            PHONE: '555-0002'
            CREATED_AT: '2023-06-15 12:00:00 +00:00'
            UPDATED_AT: '2023-06-15 12:00:00 +00:00'
            _FIVETRAN_SYNCED: '2023-06-15 12:00:00 +00:00'
            _FIVETRAN_START: '2023-06-15 12:00:00 +00:00'
            _FIVETRAN_END:   '2024-01-01 00:00:00 +00:00'
            _FIVETRAN_ACTIVE: false
    expect:
      rows:
        - SourceCustomerBK: '202'
          EffectiveStartDateTime: '2023-06-15 12:00:00 +00:00'
          EffectiveEndDateTime:   '2024-01-01 00:00:00 +00:00'
          CurrentFlagYN: 'Y'
          DeletedFlagYN: 'Y'
          FullName: 'Grace Hopper'
          EmailAddress: 'grace@example.com'

