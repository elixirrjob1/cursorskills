# Unit tests for vw_DimEmployee.
#
# First 2 tests (hand-crafted): assert latest-sync dedup and FullName null handling.
#
# Last 3 tests (generated by view-to-dbt-unit-test skill): schema-shape coverage
# with type/name-aware fixtures from OpenMetadata. They are disabled until TODO
# expected values are filled from dbt diff output.

version: 2

unit_tests:

- name: test_dim_employee__latest_sync_wins
  description: >
    Scenario: two source rows share an EMPLOYEE_ID. The row with the latest
    _FIVETRAN_SYNCED timestamp should survive the QUALIFY ROW_NUMBER() filter.
  model: vw_DimEmployee
  given:
  - input: source('bronze_erp__dbo', 'EMPLOYEES')
    rows:
    - EMPLOYEE_ID: 1001
      FIRST_NAME: Grace
      LAST_NAME: Hopper
      EMAIL: grace.old@example.com
      ROLE: Engineer
      HIRE_DATE: '2022-01-15'
      STORE_ID: 10
      _FIVETRAN_SYNCED: '2024-01-01 00:00:00 +00:00'
    - EMPLOYEE_ID: 1001
      FIRST_NAME: Grace
      LAST_NAME: Hopper
      EMAIL: grace.new@example.com
      ROLE: Principal Engineer
      HIRE_DATE: '2022-01-15'
      STORE_ID: 11
      _FIVETRAN_SYNCED: '2024-03-01 00:00:00 +00:00'
  expect:
    rows:
    - FirstName: Grace
      LastName: Hopper
      FullName: Grace Hopper
      EmailAddress: grace.new@example.com
      JobTitle: Principal Engineer
      HireDate: '2022-01-15'
      LoadTimestamp: '2024-03-01 00:00:00 +00:00'
      Department: null
      TerminationDate: null
      ManagerEmployeeHashFK: null
      IsActive: null
      EtlBatchId: 0

- name: test_dim_employee__fullname_handles_nulls
  description: >
    Scenario: vw_DimEmployee.sql computes FullName as
      TRIM(FIRST_NAME) || ' ' || TRIM(LAST_NAME)
    *without* a COALESCE on either side, so any NULL on either name causes
    string concatenation to yield NULL — unlike vw_DimCustomer which wraps
    each part in COALESCE(..., '').
  model: vw_DimEmployee
  given:
  - input: source('bronze_erp__dbo', 'EMPLOYEES')
    rows:
    - EMPLOYEE_ID: 2001
      FIRST_NAME: null
      LAST_NAME: Einstein
      EMAIL: einstein@example.com
      ROLE: Scientist
      HIRE_DATE: '2020-01-01'
      STORE_ID: null
      _FIVETRAN_SYNCED: '2024-01-01 00:00:00 +00:00'
    - EMPLOYEE_ID: 2002
      FIRST_NAME: Marie
      LAST_NAME: null
      EMAIL: curie@example.com
      ROLE: Chemist
      HIRE_DATE: '2020-01-02'
      STORE_ID: null
      _FIVETRAN_SYNCED: '2024-01-02 00:00:00 +00:00'
    - EMPLOYEE_ID: 2003
      FIRST_NAME: null
      LAST_NAME: null
      EMAIL: unknown@example.com
      ROLE: Analyst
      HIRE_DATE: '2020-01-03'
      STORE_ID: null
      _FIVETRAN_SYNCED: '2024-01-03 00:00:00 +00:00'
  expect:
    rows:
    - FirstName: null
      LastName: Einstein
      FullName: null
      HomeStoreHashFK: null
    - FirstName: Marie
      LastName: null
      FullName: null
      HomeStoreHashFK: null
    - FirstName: null
      LastName: null
      FullName: null
      HomeStoreHashFK: null

